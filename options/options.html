<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      padding: 16px;
      max-width: 400px;
    }

    h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 4px;
      color: #333;
    }

    .help {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }

    .actions {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    button {
      padding: 6px 16px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: #fff;
      transition: background 0.15s;
    }

    button:hover {
      background: #f9fafb;
    }

    .btn-save {
      color: #fff;
      background: #2563eb;
      border-color: #2563eb;
    }

    .btn-save:hover {
      background: #1d4ed8;
    }

    #status {
      font-size: 12px;
      color: #166534;
    }
  </style>
</head>
<body>
  <h2>Alias RSVP Settings</h2>

  <label for="aliasDomain">Alias domain</label>
  <div class="help">The domain used for your email aliases. Calendar replies will be sent from the attendee address matching this domain.</div>
  <input type="text" id="aliasDomain" placeholder="example.com">

  <div class="actions">
    <button class="btn-save" id="save">Save</button>
    <span id="status"></span>
  </div>

  <script src="options.js"></script>
</body>
</html>
